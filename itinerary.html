<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>行程資訊</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Roboto+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  /* ===================== 設定區 ===================== */
  :root{
    /* 預設品牌色 (會被試算表 CSS 分頁 B2 覆寫) */
    --brand-r:249; --brand-g:115; --brand-b:22;

    --radius-lg:20px;
    --radius-md:14px;
    --radius-sm:10px;
    --max-width:480px;
  }

  [data-theme="dark"]{
    --bg:#14161b;
    --surface:#1d2027;
    --surface-2:#262a33;
    --surface-3:#2f343f;
    --text:#f4f1ec;
    --text-muted:#9aa0ab;
    --border:rgba(255,255,255,0.08);
    --shadow:0 4px 16px rgba(0,0,0,0.35);
  }
  [data-theme="light"]{
    --bg:#f7f4ef;
    --surface:#ffffff;
    --surface-2:#f0ece4;
    --surface-3:#e6e1d8;
    --text:#2b2823;
    --text-muted:#7a746a;
    --border:rgba(0,0,0,0.07);
    --shadow:0 4px 16px rgba(0,0,0,0.08);
  }

  /* 品牌色（不透明）與輔助透明度版本 */
  :root{
    --brand: rgb(var(--brand-r),var(--brand-g),var(--brand-b));
    --brand-08: rgba(var(--brand-r),var(--brand-g),var(--brand-b),0.08);
    --brand-15: rgba(var(--brand-r),var(--brand-g),var(--brand-b),0.15);
    --brand-25: rgba(var(--brand-r),var(--brand-g),var(--brand-b),0.25);
    --brand-45: rgba(var(--brand-r),var(--brand-g),var(--brand-b),0.45);
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
    min-height:100vh;
    transition:background .25s,color .25s;
  }
  .app{
    max-width:var(--max-width);
    margin:0 auto;
    min-height:100vh;
    position:relative;
    padding:18px 16px 100px;
  }

  /* ===================== 頂部標題 ===================== */
  .header{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    margin-bottom:16px;
    gap:8px;
  }
  .trip-title{
    font-size:20px;
    font-weight:900;
    line-height:1.35;
    letter-spacing:.02em;
    word-break:break-word;
  }
  .theme-toggle{
    flex-shrink:0;
    width:40px;height:40px;
    border-radius:50%;
    border:1px solid var(--border);
    background:var(--surface);
    color:var(--text);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    box-shadow:var(--shadow);
  }
  .theme-toggle svg{width:18px;height:18px;}

  /* ===================== 日期卡片區 ===================== */
  .date-scroll{
    display:flex;
    gap:10px;
    overflow-x:auto;
    overflow-y:hidden;
    padding-bottom:10px;
    margin-bottom:14px;
    scrollbar-width:none;
    -webkit-overflow-scrolling:touch;
    cursor:grab;
  }
  .date-scroll::-webkit-scrollbar{display:none;}
  .date-card{
    flex:0 0 auto;
    width:74px;height:74px;
    border-radius:var(--radius-md);
    background:var(--surface);
    border:1px solid var(--border);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:4px;
    cursor:pointer;
    font-weight:700;
    transition:transform .15s,background .15s,border-color .15s,color .15s;
    color:var(--text);
  }
  .date-card .d-date{font-size:14px;line-height:1.2;}
  .date-card .d-day{font-size:14px;line-height:1.2;font-family:"Roboto Mono",monospace;}
  .date-card.active{
    background:var(--brand);
    border-color:var(--brand);
    color:#fff;
    transform:translateY(-2px);
  }

  /* ===================== 行程清單 ===================== */
  #itineraryAnchor{position:relative;top:-1px;}

  .day-card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius-lg);
    overflow:hidden;
    box-shadow:var(--shadow);
  }

  /* 條列式：同一張卡片內，一列一列 */
  .list-row{
    display:flex;
    gap:14px;
    padding:14px 16px;
    border-bottom:1px solid var(--border);
    position:relative;
  }
  .list-row:last-child{border-bottom:none;}
  .list-row.current{
    background:linear-gradient(90deg, var(--brand-25), var(--brand-08));
  }
  .list-row.current::before{
    content:"";
    position:absolute;left:0;top:0;bottom:0;
    width:4px;background:var(--brand);
  }
  .list-row .time-col{
    flex:0 0 52px;
    display:flex;
    flex-direction:column;
    align-items:center;
    font-family:"Roboto Mono",monospace;
    font-weight:700;
    font-size:14px;
    line-height:1.6;
    color:var(--text);
    padding-top:1px;
  }
  .list-row .time-col .t-sep{
    color:var(--text-muted);
    font-weight:500;
    font-size:12px;
  }
  .list-row .time-col .t-end{
    color:var(--text-muted);
    font-weight:500;
  }
  .list-row .content-col{flex:1;min-width:0;}
  .list-row .activity{
    font-size:15px;
    font-weight:700;
    line-height:1.4;
    word-break:break-word;
  }
  .list-row .place,
  .list-row .note{
    font-size:12px;
    color:var(--text-muted);
    line-height:1.5;
    margin-top:3px;
    word-break:break-word;
  }
  .list-row .place a{
    color:var(--brand);
    text-decoration:none;
    font-weight:500;
  }
  .list-row .place a:hover{text-decoration:underline;}

  /* 卡片式：每個行程一張卡，時間放大置於行程名稱上方 */
  .activity-card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius-lg);
    box-shadow:var(--shadow);
    padding:14px 16px;
    display:flex;
    flex-direction:column;
    margin-bottom:10px;
  }
  .activity-card:last-child{margin-bottom:0;}
  .activity-card.current{
    background:linear-gradient(90deg, var(--brand-25), var(--brand-08));
    border-color:var(--brand-45);
  }
  .activity-card .card-time{
    display:flex;
    flex-direction:row;
    align-items:baseline;
    gap:6px;
    font-family:"Roboto Mono",monospace;
    font-weight:700;
    line-height:1.25;
    margin-bottom:8px;
  }
  .activity-card .card-time .t-start,
  .activity-card .card-time .t-end{
    font-size:24px;
  }
  .activity-card .card-time .t-sep{
    font-size:13px;
    color:var(--text-muted);
    font-weight:500;
    line-height:1;
  }
  .activity-card .card-time .t-end{
    color:var(--text-muted);
  }
  .activity-card .content-col{min-width:0;}
  .activity-card .activity{
    font-size:15px;
    font-weight:700;
    line-height:1.4;
    word-break:break-word;
  }
  .activity-card .place,
  .activity-card .note{
    font-size:12px;
    color:var(--text-muted);
    line-height:1.5;
    margin-top:3px;
    word-break:break-word;
  }
  .activity-card .place a{
    color:var(--brand);
    text-decoration:none;
    font-weight:500;
  }
  .activity-card .place a:hover{text-decoration:underline;}

  .empty-msg, .loading-msg, .error-msg{
    text-align:center;
    color:var(--text-muted);
    font-size:13px;
    padding:40px 10px;
  }
  .error-msg{color:#e05c5c;}

  /* ===================== 浮動：檢視切換按鈕 ===================== */
  .view-toggle{
    position:fixed;
    right:18px;
    bottom:18px;
    width:52px;height:52px;
    border-radius:50%;
    background:var(--brand);
    color:#fff;
    display:flex;align-items:center;justify-content:center;
    border:none;
    cursor:pointer;
    box-shadow:0 6px 18px rgba(0,0,0,0.35);
    z-index:40;
  }
  .view-toggle svg{width:22px;height:22px;}

  /* ===================== 浮動：左側選單 ===================== */
  .menu-fab{
    position:fixed;
    left:18px;
    bottom:18px;
    width:52px;height:52px;
    border-radius:50%;
    background:var(--surface);
    border:1px solid var(--border);
    color:var(--text);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    box-shadow:0 6px 18px rgba(0,0,0,0.3);
    z-index:50;
  }
  .menu-fab svg{width:24px;height:24px;color:var(--brand);}

  .menu-fab.inline-pos{
    position:static;
    width:40px;height:40px;
    box-shadow:none;
    flex-shrink:0;
  }
  .menu-fab.inline-pos svg{width:20px;height:20px;}

  .menu-overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.45);
    z-index:45;
    display:none;
  }
  .menu-overlay.open{display:block;}

  .menu-panel{
    position:fixed;
    left:18px;
    bottom:80px;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius-md);
    box-shadow:0 8px 24px rgba(0,0,0,0.35);
    overflow:hidden;
    z-index:50;
    min-width:220px;
    display:none;
  }
  .menu-panel.open{display:block;}
  .menu-item{
    display:flex;
    align-items:center;
    gap:16px;
    padding:18px 20px;
    cursor:pointer;
    font-size:17px;
    font-weight:500;
    color:var(--text);
    border-bottom:1px solid var(--border);
  }
  .menu-item:last-child{border-bottom:none;}
  .menu-item:active{background:var(--surface-2);}
  .menu-item svg{width:24px;height:24px;color:var(--brand);flex-shrink:0;}
  .menu-item.active-page{color:var(--brand);}

  /* ===================== 頁面容器 ===================== */
  .page{display:none;}
  .page.active{display:block;}

  /* ===================== 匯率頁 ===================== */
  /* 匯率頁：利用 dvh 偵測實際可見高度（含手機網址列），維持不捲動又不被遮擋 */
  #page-exchange{
    position:fixed;
    inset:0;
    display:none;
    flex-direction:column;
    align-items:center;         /* 內容置中，維持左右寬度限制 */
    background:var(--bg);
    overflow:hidden;
    z-index:10;
    /* dvh = 動態可見視窗高度（自動扣掉手機網址列） */
    height:100dvh;
  }
  #page-exchange.active{
    display:flex;
  }
  /* 內容包裝：維持與其他頁相同的最大寬度與左右 padding */
  .exchange-inner{
    width:100%;
    max-width:var(--max-width);
    flex:1;
    display:flex;
    flex-direction:column;
    padding:16px 16px 16px;
    box-sizing:border-box;
    min-height:0;
  }
  .exchange-top{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius-lg);
    box-shadow:var(--shadow);
    padding:16px 16px 14px;
    margin-bottom:12px;
    flex-shrink:0;
  }
  .currency-row{margin-bottom:14px;}
  .currency-row:last-of-type{margin-bottom:0;}
  .currency-row label{
    display:block;
    font-size:12px;
    color:var(--text-muted);
    margin-bottom:6px;
    font-weight:500;
  }
  .currency-row input{
    width:100%;
    background:var(--surface-2);
    border:1px solid var(--border);
    border-radius:var(--radius-sm);
    color:var(--text);
    font-size:24px;
    font-weight:700;
    font-family:"Roboto Mono",monospace;
    padding:12px 14px;
    text-align:right;
    outline:none;
    caret-color:var(--brand);
  }
  .currency-row input:focus{border-color:var(--brand);}
  .exchange-actions{
    display:flex;
    align-items:center;
    gap:10px;
    margin-top:16px;
  }
  .clear-btn{
    flex:1;
    background:var(--brand);
    border:none;
    color:#fff;
    font-size:14px;
    font-weight:700;
    padding:13px 20px;
    border-radius:var(--radius-sm);
    cursor:pointer;
  }
  .clear-btn:active{background:rgb(calc(var(--brand-r) - 20),calc(var(--brand-g) - 20),calc(var(--brand-b) - 20));}

  .keypad{
    /* 鍵盤佔可視高度約 45%，空間不足時縮小但不低於 200px */
    height:min(45dvh, calc(100dvh - 300px));
    min-height:200px;
    flex-shrink:1;
    margin-top:auto; /* 推到底部，留白自動在中間 */
    margin-bottom:20px;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    grid-template-rows:repeat(5,1fr);
    gap:8px;
  }
  .key{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius-sm);
    color:var(--text);
    font-size:20px;
    font-weight:700;
    font-family:"Roboto Mono",monospace;
    padding:0;
    cursor:pointer;
    box-shadow:var(--shadow);
    user-select:none;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .key:active{background:var(--surface-2);}
  .key.op{color:var(--brand);}
  .key.equals{background:var(--brand);color:#fff;border-color:var(--brand);}
  .key.equals:active{background:rgb(calc(var(--brand-r) - 20),calc(var(--brand-g) - 20),calc(var(--brand-b) - 20));}

  /* ===================== 外部連結頁 ===================== */
  .links-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
  }
  .link-card{
    aspect-ratio:1/1;
    background:var(--brand-15);
    border:1px solid var(--brand-25);
    border-radius:var(--radius-lg);
    box-shadow:var(--shadow);
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:16px 10px;
    cursor:pointer;
    text-decoration:none;
    color:var(--text);
    font-size:14px;
    font-weight:700;
    line-height:1.5;
    white-space:pre-wrap;
    word-break:break-word;
    transition:border-color .15s;
  }
  .link-card:active{border-color:var(--brand);}

  /* ===================== 通用 ===================== */
  .section-title{
    font-size:13px;
    font-weight:700;
    color:var(--text-muted);
    margin:0 0 10px 2px;
  }
</style>
</head>

<script>
/* ============================================================
   設定區
============================================================ */
const params = new URLSearchParams(window.location.search);
const SHEET_ID = params.get('sheet') || '1JdL3Rs2jaqikEvUowsSEsDMCe5veueIpzt6dQG2H0RA';

const SHEET_NAMES = {
  itinerary: '條列式大表',
  rates: '預設匯率',
  links: '外部連結',
  css: 'CSS'
};

function csvUrl(sheetName){
  return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}&_=${Date.now()}`;
}

/* ============================================================
   CSV 解析（支援引號內含逗號與換行）
============================================================ */
function parseCSV(text){
  const rows = [];
  let row = [];
  let field = '';
  let inQuotes = false;
  for(let i=0;i<text.length;i++){
    const c = text[i];
    if(inQuotes){
      if(c === '"'){
        if(text[i+1] === '"'){ field += '"'; i++; }
        else { inQuotes = false; }
      } else {
        field += c;
      }
    } else {
      if(c === '"'){ inQuotes = true; }
      else if(c === ','){ row.push(field); field=''; }
      else if(c === '\r'){ /* skip */ }
      else if(c === '\n'){ row.push(field); rows.push(row); row=[]; field=''; }
      else { field += c; }
    }
  }
  if(field.length>0 || row.length>0){ row.push(field); rows.push(row); }
  return rows.filter(r => !(r.length===1 && r[0]===''));
}

async function fetchSheet(sheetName){
  const res = await fetch(csvUrl(sheetName));
  if(!res.ok) throw new Error('讀取失敗: ' + sheetName);
  const text = await res.text();
  return parseCSV(text);
}

function escapeHtml(str){
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}
function nl2br(str){
  return escapeHtml(str).replace(/\n/g,'<br>');
}

const WEEKDAYS = ['日','一','二','三','四','五','六'];

function parseDateStr(dateStr, yearHint){
  // "6/27" -> {month:6, day:27}
  const parts = dateStr.split('/');
  if(parts.length !== 2) return null;
  const month = parseInt(parts[0],10);
  const day = parseInt(parts[1],10);
  if(isNaN(month) || isNaN(day)) return null;
  return {month, day};
}

function buildDateTime(dateStr, timeStr){
  const d = parseDateStr(dateStr);
  if(!d) return null;
  const now = new Date();
  let year = now.getFullYear();
  const tParts = (timeStr||'').split(':');
  const h = parseInt(tParts[0],10) || 0;
  const m = parseInt(tParts[1],10) || 0;
  return new Date(year, d.month-1, d.day, h, m, 0, 0);
}

function formatDateCard(dateStr, dayIndex){
  const d = parseDateStr(dateStr);
  let weekday = '';
  if(d){
    const now = new Date();
    const dt = new Date(now.getFullYear(), d.month-1, d.day);
    weekday = WEEKDAYS[dt.getDay()];
  }
  return {
    dateLine: `${dateStr}(${weekday})`,
    dayLine: `DAY${dayIndex+1}`
  };
}

  const dataRows = rows.filter(r => /^\d+\/\d+$/.test((r[0]||'').trim()));

function isRowCurrent(row){
  const start = buildDateTime(row.date, row.start);
  let end = buildDateTime(row.date, row.end);
  if(!start || !end) return false;
  if(end <= start){
    // 跨日：結束時間視為次日
    end = new Date(end.getTime() + 24*60*60*1000);
  }
  const now = new Date();
  return now >= start && now < end;
}

let twdName = '新台幣';
let fxName = '外幣';
let twdRate = 1;   // B1
let fxRate = 1;    // B2
// 關係： B1 個 TWD = B2 個外幣  =>  TWD = 外幣 * (B1/B2)  ;  外幣 = TWD * (B2/B1)

let activeInput = null; // 'twd' or 'fx'
let expr = '';          // 目前輸入中的算式字串

function formatNumber(num){
  if(!isFinite(num)) return '';
  // 最多顯示到小數第4位，並去除多餘的0
  let rounded = Math.round(num * 10000) / 10000;
  let parts = rounded.toString().split('.');
  parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  return parts.join('.');
}

/* 將輸入中的算式字串加上千分位顯示（不影響實際運算用的 expr） */
function formatIntWithCommas(s){
  if(s === '') return '0';
  return s.replace(/\B(?=(\d{3})+(?!\d))/g, ',');
}
function formatNumPart(numStr){
  if(numStr === '') return '';
  const dotIdx = numStr.indexOf('.');
  if(dotIdx === -1) return formatIntWithCommas(numStr);
  const intPart = numStr.slice(0, dotIdx);
  const decPart = numStr.slice(dotIdx+1);
  return formatIntWithCommas(intPart) + '.' + decPart;
}
function formatExprForDisplay(str){
  let result = '';
  let num = '';
  for(let i=0;i<str.length;i++){
    const c = str[i];
    if(/[0-9.]/.test(c)){
      num += c;
    } else {
      if(num !== ''){ result += formatNumPart(num); num=''; }
      result += c;
    }
  }
  if(num !== '') result += formatNumPart(num);
  return result;
}

/* 簡易算式運算（支援 + - × ÷ %，× ÷ 優先於 + -，% 為前一數字除以100） */
function evalExpr(str){
  if(str === '' || str === undefined) return NaN;
  // tokenize
  const tokens = [];
  let num = '';
  for(let i=0;i<str.length;i++){
    const c = str[i];
    if(/[0-9.]/.test(c)){
      num += c;
    } else {
      if(num !== ''){ tokens.push(num); num=''; }
      if(c === '%'){
        tokens.push('%');
      } else if('+-×÷'.includes(c)){
        tokens.push(c);
      }
    }
  }
  if(num !== '') tokens.push(num);
  if(tokens.length === 0) return NaN;

  // 處理 %（postfix，最高優先）
  let t1 = [];
  for(let i=0;i<tokens.length;i++){
    if(tokens[i] === '%'){
      const prev = t1.pop();
      t1.push((parseFloat(prev)/100).toString());
    } else {
      t1.push(tokens[i]);
    }
  }

  // 處理 × ÷
  let t2 = [];
  let i=0;
  while(i < t1.length){
    if(t1[i] === '×' || t1[i] === '÷'){
      const a = parseFloat(t2.pop());
      const b = parseFloat(t1[i+1]);
      let res;
      if(t1[i] === '×') res = a*b;
      else res = b !== 0 ? a/b : NaN;
      t2.push(res.toString());
      i += 2;
    } else {
      t2.push(t1[i]);
      i++;
    }
  }

  // 處理 + -
  let result = parseFloat(t2[0]);
  if(isNaN(result)) return NaN;
  i=1;
  while(i < t2.length){
    const op = t2[i];
    const val = parseFloat(t2[i+1]);
    if(op === '+') result += val;
    else if(op === '-') result -= val;
    i += 2;
  }
  return result;
}

function syncFromExpr(){
  const val = evalExpr(expr);
  const twdInput = document.getElementById('twdInput');
  const fxInput = document.getElementById('fxInput');
  const display = formatExprForDisplay(expr);

  if(activeInput === 'twd'){
    twdInput.value = display;
    if(!isNaN(val)){
      const fx = val * (fxRate/twdRate);
      fxInput.value = formatNumber(fx);
    }
    // 算式不完整(如 "100+")無法計算時，外幣欄位保留上次數值不變
  } else if(activeInput === 'fx'){
    fxInput.value = display;
    if(!isNaN(val)){
      const twd = val * (twdRate/fxRate);
      twdInput.value = formatNumber(twd);
    }
    // 算式不完整時，新台幣欄位保留上次數值不變
  }
}

  const btn = e.target.closest('.key');

/* 桌機鍵盤支援 */
document.addEventListener('keydown', (e) => {
  if(currentPage !== 'exchange') return;
  const k = e.key;
  if(/[0-9.]/.test(k)){ handleKey(k); e.preventDefault(); }
  else if(k === '+'){ handleKey('+'); e.preventDefault(); }
  else if(k === '-'){ handleKey('-'); e.preventDefault(); }
  else if(k === '*'){ handleKey('×'); e.preventDefault(); }
  else if(k === '/'){ handleKey('÷'); e.preventDefault(); }
  else if(k === '%'){ handleKey('%'); e.preventDefault(); }
  else if(k === 'Enter' || k === '='){ handleKey('='); e.preventDefault(); }
  else if(k === 'Backspace'){ handleKey('back'); e.preventDefault(); }
  else if(k === 'Escape'){ handleKey('ac'); e.preventDefault(); }
});

function handleKey(key){
  if(!activeInput){
    activeInput = 'twd';
    document.getElementById('twdInput').focus();
  }

  if(key === 'ac'){
    clearExchange();
    return;
  }
  if(key === 'back'){
    expr = expr.slice(0,-1);
    syncFromExpr();
    return;
  }
  if(key === '='){
    const val = evalExpr(expr);
    expr = isNaN(val) ? '' : (Math.round(val*10000)/10000).toString();
    syncFromExpr();
    return;
  }
  if(key === '000'){
    expr += '000';
    syncFromExpr();
    return;
  }
  // 數字 / 運算符 / .
  expr += key;
  syncFromExpr();
}

    if(hex) applyBrandColor(hex);
  }catch(e){
    console.warn('品牌色讀取失敗，使用預設色', e);
  }
}

/* ============================================================
   初始化與自動刷新
============================================================ */
async function loadAll(isInitial){
  try{
    await Promise.all([
      loadItinerary(),
      loadRates(),
      loadLinks(),
      loadBrandColor()
    ]);

    if(isInitial){
      selectInitialDate();
    } else {
      // 若目前選擇的日期已不存在於資料中，回退到第一天
      if(!dateList.includes(selectedDate)){
        selectedDate = dateList[0] || null;
      }
    }

    renderDateCards();
    renderItinerary();
  }catch(e){
    console.error(e);
    if(isInitial){
      document.getElementById('itineraryContent').innerHTML =
        '<div class="error-msg">資料讀取失敗，請確認試算表已設定為「知道連結的使用者可檢視」。</div>';
    }
  }
}

loadAll(true);

/* 每秒檢查，於每個 :00,:10,:20,:30,:40,:50 秒自動刷新資料（背景刷新，不變更使用者已選日期） */
setInterval(() => {
  const now = new Date();
  if(now.getSeconds() % 10 === 0){
    loadAll(false);
  }
}, 1000);
</script>
